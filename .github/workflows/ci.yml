name: devops-complete project CI/CD pipeline

on:
  push:
    branches: [ main ]

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Set short SHA
        run: echo "SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t arrovi18/devops-complete:${{ env.SHORT_SHA }} terraform-configs

      - name: Push Docker image
        run: docker push arrovi18/devops-complete:${{ env.SHORT_SHA }}
        -name:congure Git AUTHOR
        run: |
          git config --global user.name "gidikoml"

          git config --global user.email "aroyovo376@gmail.com
        - name: update helm-chart with new image tag
        run: |
          sed -i "s/tag: .*/tag: ${{ env.SHORT_SHA }}/" ./devops-complete-time-printer/values.yaml
          cat ./devops-complete-time-printer/values.yaml
          git add ./devops-complete-time-printer/values.yaml
          git commit -m "Update image tag to ${{ env.SHORT_SHA }}"
          git push
